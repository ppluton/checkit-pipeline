services:
  postgres:
    image: postgres:16
    container_name: checkit-postgres
    environment:
      # Airflow metadata role / database (full privileges on its own DB).
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
      # Application database + least-privilege role for the pipeline load task.
      CHECKIT_DB: ${CHECKIT_DB:-checkit}
      CHECKIT_APP_USER: ${CHECKIT_APP_USER:-checkit_app}
      CHECKIT_APP_PASSWORD: ${CHECKIT_APP_PASSWORD:-checkit_app}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - checkit_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow} -d ${POSTGRES_DB:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  checkit_pgdata:
